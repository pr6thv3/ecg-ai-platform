name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test-and-benchmark:
    name: Test & Benchmark
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install pytest pytest-cov httpx onnx onnxruntime tabulate psutil

      - name: Run Pytest with Coverage
        run: |
          cd backend
          pytest tests/ --cov=api --cov=inference --cov=preprocessing --cov-fail-under=75 --cov-report=term-missing

      - name: Run ONNX Benchmark
        id: benchmark
        run: |
          cd backend
          python scripts/benchmark_inference.py > benchmark_output.txt
          echo "BENCHMARK_RESULTS<<EOF" >> $GITHUB_ENV
          cat benchmark_output.txt >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Post Benchmark Summary
        run: |
          echo "### ONNX vs PyTorch Inference Benchmark" >> $GITHUB_STEP_SUMMARY
          echo '```text' >> $GITHUB_STEP_SUMMARY
          cat backend/benchmark_output.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

  build-docker:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: test-and-benchmark
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Build Backend Image
        run: docker build -t ecg-backend ./backend

  deploy:
    name: Deploy & Validate
    runs-on: ubuntu-latest
    needs: build-docker
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Trigger Render Deployment
        run: |
          curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK_URL }}

      - name: Wait for Deployment & Validate Health
        run: |
          echo "Waiting 60 seconds for deployment to settle..."
          sleep 60
          HEALTH_URL="https://ecg-ai-backend.onrender.com/health"
          echo "Checking health endpoint: $HEALTH_URL"
          
          # Retry up to 5 times
          for i in {1..5}; do
            STATUS=$(curl -s $HEALTH_URL | jq -r .status)
            if [ "$STATUS" == "ok" ]; then
              echo "Deployment validation successful! Status is ok."
              exit 0
            fi
            echo "Attempt $i: Status is not ok (got $STATUS). Retrying in 15 seconds..."
            sleep 15
          done
          
          echo "Deployment validation failed! Health check did not return status=ok."
          exit 1
