name: Inference Benchmark

on:
  pull_request:
    branches:
      - main

jobs:
  benchmark:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install torch onnx onnxruntime numpy tabulate

      - name: Run Benchmark
        id: benchmark
        run: |
          cd backend
          # Ensure dummy models exist for CI testing
          python -c "import torch, os; from models.train import ECGNet; m=ECGNet(5); os.makedirs('models', exist_ok=True); torch.save(m.state_dict(), 'models/ecg_cnn.pth')"
          python scripts/export_onnx.py --model-path models/ecg_cnn.pth --output-path models/ecg_cnn.onnx
          
          # Run benchmark and capture output
          echo "BENCHMARK_RESULTS<<EOF" >> $GITHUB_OUTPUT
          python scripts/benchmark_inference.py >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Comment PR
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const output = `### 🚀 Inference Benchmark Results
            
            \`\`\`text
            ${{ steps.benchmark.outputs.BENCHMARK_RESULTS }}
            \`\`\`
            
            *Automated benchmark run comparing PyTorch vs ONNX Runtime performance.*`;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            })
