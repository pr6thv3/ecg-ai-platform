name: Inference Benchmark

on:
  pull_request:
    branches: [ main ]

jobs:
  benchmark:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Run committed artifact benchmark
        id: benchmark
        run: |
          cd backend
          echo "BENCHMARK_RESULTS<<EOF" >> "$GITHUB_OUTPUT"
          python scripts/benchmark_inference.py --model-path models/ecg_cnn.onnx --runs 500 >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Comment PR
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const output = `### Inference Benchmark Results

            \`\`\`text
            ${{ steps.benchmark.outputs.BENCHMARK_RESULTS }}
            \`\`\`

            *Automated benchmark run against the committed model artifact.*`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output,
            });
